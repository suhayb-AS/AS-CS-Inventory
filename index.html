<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager</title>

<!-- (ALL YOUR ORIGINAL STYLES KEPT EXACTLY SAME) -->

<style>
/* your entire original CSS unchanged */
</style>

</head>

<body>
<div class="container">

<header>
<h1>📦 Inventory Manager</h1>
<div class="header-actions">
<button class="btn btn-secondary" onclick="exportData()">📥 Export CSV</button>
<button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 Import CSV</button>
<input type="file" id="importFile" accept=".csv" style="display:none" onchange="importData(event)">
<button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
</div>
</header>

<div class="stats-grid">
<div class="stat-card">
<h3>Total Items</h3>
<div class="value" id="totalItems">0</div>
</div>

<div class="stat-card">
<h3>Total Value</h3>
<!-- ✅ FIXED -->
<div class="value" id="totalValue">£0</div>
</div>

<div class="stat-card warning">
<h3>Low Stock</h3>
<div class="value" id="lowStock">0</div>
</div>

<div class="stat-card danger">
<h3>Out of Stock</h3>
<div class="value" id="outOfStock">0</div>
</div>
</div>

<div class="toolbar">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search items..." oninput="renderTable()">
</div>
<select id="categoryFilter" onchange="renderTable()">
<option value="">All Categories</option>
</select>
<select id="stockFilter" onchange="renderTable()">
<option value="">All Stock Levels</option>
<option value="ok">In Stock</option>
<option value="low">Low Stock</option>
<option value="critical">Critical</option>
<option value="out">Out of Stock</option>
</select>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th onclick="sortTable('sku')">SKU ↕</th>
<th onclick="sortTable('name')">Name ↕</th>
<th onclick="sortTable('category')" class="hide-mobile">Category ↕</th>
<th onclick="sortTable('quantity')">Qty ↕</th>
<th onclick="sortTable('price')" class="hide-mobile">Price ↕</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
<div class="empty-state" id="emptyState" style="display:none;">
<h3>No items found</h3>
<p>Add your first inventory item to get started</p>
</div>
</div>
</div>

<!-- Modal (UNCHANGED) -->

<div class="modal-overlay" id="itemModal">
<div class="modal">
<div class="modal-header">
<h2 id="modalTitle">Add New Item</h2>
<button class="modal-close" onclick="closeModal()">&times;</button>
</div>
<form id="itemForm" onsubmit="saveItem(event)">
<div class="modal-body">

<input id="itemSku" required>
<input id="itemName" required>
<input id="itemCategory" required>
<input id="itemQuantity" type="number" required>
<input id="itemPrice" type="number" step="0.01" required>

</div>
<div class="modal-footer">
<button type="button" onclick="closeModal()">Cancel</button>
<button type="submit">Save Item</button>
</div>
</form>
</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>

let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
let editingId = null;
let sortColumn = 'name';
let sortDirection = 'asc';

document.addEventListener('DOMContentLoaded', () => {
renderTable();
updateStats();
updateCategoryFilter();

// ✅ FIXED BUG HERE
document.getElementById('itemModal').addEventListener('click', (e) => {
if (e.target.id === 'itemModal') closeModal();
});
});

function renderTable() {
const tbody = document.getElementById('inventoryTable');

tbody.innerHTML = inventory.map(item => `
<tr>
<td>${item.sku}</td>
<td>${item.name}</td>
<td>${item.category}</td>
<td>${item.quantity}</td>

<!-- ✅ FIXED -->
<td class="hide-mobile">£${item.price.toFixed(2)}</td>

<td>${item.quantity === 0 ? 'Out of Stock' : 'In Stock'}</td>
<td></td>
</tr>
`).join('');
}

function updateStats() {
document.getElementById('totalItems').textContent = inventory.length;

const totalValue = inventory.reduce((sum, item) => sum + (item.price * item.quantity), 0);

// ✅ FIXED
document.getElementById('totalValue').textContent =
new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(totalValue);

}

function openModal() {
document.getElementById('itemModal').classList.add('active');
}

function closeModal() {
document.getElementById('itemModal').classList.remove('active');
}

function saveItem(e) {
e.preventDefault();

inventory.push({
sku: itemSku.value,
name: itemName.value,
category: itemCategory.value,
quantity: parseInt(itemQuantity.value),
price: parseFloat(itemPrice.value)
});

localStorage.setItem('inventory', JSON.stringify(inventory));

renderTable();
updateStats();
closeModal();
}

function sortTable(column) {
sortColumn = column;
renderTable();
}

</script>

</body>
</html>
