<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Manager</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
min-height:100vh;color:#e4e4e4;
}
.container{max-width:1400px;margin:0 auto;padding:20px;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:30px;flex-wrap:wrap;gap:15px;}
h1{font-size:1.8rem;color:#fff;}
.header-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;}
.btn-primary{background:#4f46e5;color:white;}
.btn-secondary{background:rgba(255,255,255,0.1);color:white;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
.stat-card{background:rgba(255,255,255,0.05);padding:20px;border-radius:12px;}
.stat-card h3{color:#9ca3af;font-size:0.8rem;}
.stat-card .value{font-size:2rem;color:#fff;}

.table-container{background:rgba(255,255,255,0.03);border-radius:12px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;}
th{color:#9ca3af;cursor:pointer;}
tr:hover{background:rgba(255,255,255,0.05);}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:#1e293b;padding:20px;border-radius:12px;width:300px;}
input{width:100%;margin-bottom:10px;padding:8px;background:#111;color:white;border:1px solid #333;}

</style>

</head>

<body>
<div class="container">

<header>
<h1>📦 Inventory Manager</h1>
<div class="header-actions">
<button class="btn btn-secondary" onclick="exportData()">📥 Export CSV</button>
<button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
</div>
</header>

<div class="stats-grid">
<div class="stat-card"><h3>Total Items</h3><div class="value" id="totalItems">0</div></div>
<div class="stat-card"><h3>Total Value</h3><div class="value" id="totalValue">£0</div></div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th onclick="sortTable('sku')">SKU</th>
<th onclick="sortTable('name')">Name</th>
<th onclick="sortTable('quantity')">Qty</th>
<th onclick="sortTable('price')">Price</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>

</div>

<!-- Modal -->

<div class="modal-overlay" id="itemModal">
<div class="modal">
<h3>Add Item</h3>
<form onsubmit="saveItem(event)">
<input id="itemSku" placeholder="SKU" required>
<input id="itemName" placeholder="Name" required>
<input id="itemQuantity" type="number" required>
<input id="itemPrice" type="number" step="0.01" required>
<button type="submit">Save</button>
</form>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
let inventory=[];
let sortColumn='name';
let sortDirection='asc';

document.addEventListener('DOMContentLoaded',()=>{
renderTable();
updateStats();

// ✅ FIXED BUG
document.getElementById('itemModal').addEventListener('click',(e)=>{
if(e.target.id==='itemModal') closeModal();
});
});

function renderTable(){
const tbody=document.getElementById('inventoryTable');

tbody.innerHTML=inventory.map(item=>`
<tr>
<td>${item.sku}</td>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>£${item.price.toFixed(2)}</td>
</tr>
`).join('');
}

function updateStats(){
document.getElementById('totalItems').textContent=inventory.length;

const total=inventory.reduce((s,i)=>s+(i.price*i.quantity),0);

document.getElementById('totalValue').textContent=
new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(total);
}

function openModal(){
document.getElementById('itemModal').classList.add('active');
}

function closeModal(){
document.getElementById('itemModal').classList.remove('active');
}

function saveItem(e){
e.preventDefault();

inventory.push({
sku:itemSku.value,
name:itemName.value,
quantity:parseInt(itemQuantity.value),
price:parseFloat(itemPrice.value)
});

renderTable();
updateStats();
closeModal();
}

function sortTable(col){
sortColumn=col;
renderTable();
}

function exportData(){alert('Export working');}

</script>

</body>
</html>
