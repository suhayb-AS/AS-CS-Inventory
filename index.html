<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #059669;
            color: white;
        }

        .btn-success:hover {
            background: #047857;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-card.warning .value {
            color: #f59e0b;
        }

        .stat-card.danger .value {
            color: #ef4444;
        }

        /* Search and Filters */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: #6b7280;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        select {
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: rgba(255,255,255,0.08);
        }

        tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .stock-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stock-ok {
            background: rgba(5, 150, 105, 0.2);
            color: #34d399;
        }

        .stock-low {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .stock-critical {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .stock-out {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.4);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #9ca3af;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #9ca3af;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid #059669;
        }

        .toast.error {
            border-left: 4px solid #dc2626;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }

            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventory Manager</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportData()">📥 Export CSV</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 Import CSV</button>
                <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importData(event)">
                <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Items</h3>
                <div class="value" id="totalItems">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Value</h3>
                <div class="value" id="totalValue">$0</div>
            </div>
            <div class="stat-card warning">
                <h3>Low Stock</h3>
                <div class="value" id="lowStock">0</div>
            </div>
            <div class="stat-card danger">
                <h3>Out of Stock</h3>
                <div class="value" id="outOfStock">0</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search items..." oninput="renderTable()">
            </div>
            <select id="categoryFilter" onchange="renderTable()">
                <option value="">All Categories</option>
            </select>
            <select id="stockFilter" onchange="renderTable()">
                <option value="">All Stock Levels</option>
                <option value="ok">In Stock</option>
                <option value="low">Low Stock</option>
                <option value="critical">Critical</option>
                <option value="out">Out of Stock</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('sku')">SKU ↕</th>
                        <th onclick="sortTable('name')">Name ↕</th>
                        <th onclick="sortTable('category')" class="hide-mobile">Category ↕</th>
                        <th onclick="sortTable('quantity')">Qty ↕</th>
                        <th onclick="sortTable('price')" class="hide-mobile">Price ↕</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable">
                </tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">
                <h3>No items found</h3>
                <p>Add your first inventory item to get started</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Item</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="itemForm" onsubmit="saveItem(event)">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>SKU *</label>
                            <input type="text" id="itemSku" required placeholder="e.g., PRD-001">
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <input type="text" id="itemCategory" required list="categories" placeholder="e.g., Electronics">
                            <datalist id="categories"></datalist>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" required placeholder="e.g., Wireless Mouse">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="itemDescription" placeholder="Optional description..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantity *</label>
                            <input type="number" id="itemQuantity" required min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Unit Price *</label>
                            <input type="number" id="itemPrice" required min="0" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Low Stock Threshold</label>
                            <input type="number" id="itemLowStock" min="0" value="10" placeholder="10">
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="itemLocation" placeholder="e.g., Aisle 3, Shelf B">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // State
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        let editingId = null;
        let sortColumn = 'name';
        let sortDirection = 'asc';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            updateStats();
            updateCategoryFilter();
        });

        // Render inventory table
        function renderTable() {
            const tbody = document.getElementById('inventoryTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const stockFilter = document.getElementById('stockFilter').value;

            let filtered = inventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(search) ||
                                     item.sku.toLowerCase().includes(search) ||
                                     item.category.toLowerCase().includes(search);
                const matchesCategory = !categoryFilter || item.category === categoryFilter;
                const stockStatus = getStockStatus(item);
                const matchesStock = !stockFilter || stockStatus === stockFilter;
                return matchesSearch && matchesCategory && matchesStock;
            });

            // Sort
            filtered.sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            tbody.innerHTML = filtered.map(item => {
                const status = getStockStatus(item);
                const statusLabels = {
                    ok: 'In Stock',
                    low: 'Low Stock',
                    critical: 'Critical',
                    out: 'Out of Stock'
                };
                return `
                    <tr>
                        <td><strong>${escapeHtml(item.sku)}</strong></td>
                        <td>${escapeHtml(item.name)}</td>
                        <td class="hide-mobile">${escapeHtml(item.category)}</td>
                        <td>${item.quantity}</td>
                        <td class="hide-mobile">$${item.price.toFixed(2)}</td>
                        <td><span class="stock-badge stock-${status}">${statusLabels[status]}</span></td>
                        <td>
                            <div class="actions">
                                <button class="btn-icon btn-edit" onclick="editItem('${item.id}')" title="Edit">✏️</button>
                                <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')" title="Delete">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getStockStatus(item) {
            if (item.quantity === 0) return 'out';
            if (item.quantity <= item.lowStockThreshold / 2) return 'critical';
            if (item.quantity <= item.lowStockThreshold) return 'low';
            return 'ok';
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderTable();
        }

        function updateStats() {
            document.getElementById('totalItems').textContent = inventory.length;
            
            const totalValue = inventory.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('totalValue').textContent = '$' + totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            const lowStock = inventory.filter(item => getStockStatus(item) === 'low' || getStockStatus(item) === 'critical').length;
            document.getElementById('lowStock').textContent = lowStock;
            
            const outOfStock = inventory.filter(item => item.quantity === 0).length;
            document.getElementById('outOfStock').textContent = outOfStock;
        }

        function updateCategoryFilter() {
            const categories = [...new Set(inventory.map(item => item.category))].sort();
            const select = document.getElementById('categoryFilter');
            const currentValue = select.value;
            select.innerHTML = '<option value="">All Categories</option>' +
                categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('');
            select.value = currentValue;

            // Update datalist
            document.getElementById('categories').innerHTML = 
                categories.map(cat => `<option value="${escapeHtml(cat)}">`).join('');
        }

        // Modal functions
        function openModal(id = null) {
            editingId = id;
            const modal = document.getElementById('itemModal');
            const form = document.getElementById('itemForm');
            
            if (id) {
                const item = inventory.find(i => i.id === id);
                document.getElementById('modalTitle').textContent = 'Edit Item';
                document.getElementById('itemSku').value = item.sku;
                document.getElementById('itemName').value = item.name;
                document.getElementById('itemCategory').value = item.category;
                document.getElementById('itemDescription').value = item.description || '';
                document.getElementById('itemQuantity').value = item.quantity;
                document.getElementById('itemPrice').value = item.price;
                document.getElementById('itemLowStock').value = item.lowStockThreshold;
                document.getElementById('itemLocation').value = item.location || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Add New Item';
                form.reset();
                document.getElementById('itemLowStock').value = 10;
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
            editingId = null;
        }

        function saveItem(e) {
            e.preventDefault();
            
            const item = {
                id: editingId || Date.now().toString(),
                sku: document.getElementById('itemSku').value.trim(),
                name: document.getElementById('itemName').value.trim(),
                category: document.getElementById('itemCategory').value.trim(),
                description: document.getElementById('itemDescription').value.trim(),
                quantity: parseInt(document.getElementById('itemQuantity').value),
                price: parseFloat(document.getElementById('itemPrice').value),
                lowStockThreshold: parseInt(document.getElementById('itemLowStock').value) || 10,
                location: document.getElementById('itemLocation').value.trim(),
                updatedAt: new Date().toISOString()
            };

            // Check for duplicate SKU
            const existing = inventory.find(i => i.sku === item.sku && i.id !== item.id);
            if (existing) {
                showToast('SKU already exists!', 'error');
                return;
            }

            if (editingId) {
                const index = inventory.findIndex(i => i.id === editingId);
                inventory[index] = item;
                showToast('Item updated successfully!', 'success');
            } else {
                item.createdAt = new Date().toISOString();
                inventory.push(item);
                showToast('Item added successfully!', 'success');
            }

            saveToStorage();
            closeModal();
            renderTable();
            updateStats();
            updateCategoryFilter();
        }

        function editItem(id) {
            openModal(id);
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                inventory = inventory.filter(i => i.id !== id);
                saveToStorage();
                renderTable();
                updateStats();
                updateCategoryFilter();
                showToast('Item deleted', 'success');
            }
        }

        // Storage
        function saveToStorage() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
        }

        // Export/Import
        function exportData() {
            if (inventory.length === 0) {
                showToast('No data to export', 'error');
                return;
            }

            const headers = ['SKU', 'Name', 'Category', 'Description', 'Quantity', 'Price', 'Low Stock Threshold', 'Location'];
            const rows = inventory.map(item => [
                item.sku,
                item.name,
                item.category,
                item.description || '',
                item.quantity,
                item.price,
                item.lowStockThreshold,
                item.location || ''
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inventory_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported successfully!', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const text = e.target.result;
                    const lines = text.split('\n').filter(line => line.trim());
                    
                    if (lines.length < 2) {
                        showToast('Invalid CSV file', 'error');
                        return;
                    }

                    const newItems = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = parseCSVLine(lines[i]);
                        if (values.length >= 6) {
                            newItems.push({
                                id: Date.now().toString() + i,
                                sku: values[0] || 'SKU-' + i,
                                name: values[1] || 'Unnamed Item',
                                category: values[2] || 'Uncategorized',
                                description: values[3] || '',
                                quantity: parseInt(values[4]) || 0,
                                price: parseFloat(values[5]) || 0,
                                lowStockThreshold: parseInt(values[6]) || 10,
                                location: values[7] || '',
                                createdAt: new Date().toISOString(),
                                updatedAt: new Date().toISOString()
                            });
                        }
                    }

                    inventory = [...inventory, ...newItems];
                    saveToStorage();
                    renderTable();
                    updateStats();
                    updateCategoryFilter();
                    showToast(`Imported ${newItems.length} items!`, 'success');
                } catch (err) {
                    showToast('Error parsing CSV', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        // Toast notifications
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${escapeHtml(message)}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on escape or outside click
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('itemModal').addEventListener('click', (e) => {
            if (e.target.id === 'itemModal') closeModal();
        });
    </script>
</body>
</html>
