<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #e4e4e4;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
        }
        h1 { font-size: 1.8rem; font-weight: 600; color: #fff; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card h3 { font-size: 0.85rem; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #fff; }
        .stat-card.warning .value { color: #f59e0b; }
        .stat-card.danger .value { color: #ef4444; }
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 40px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            background: rgba(255,255,255,0.05); color: #fff; font-size: 0.95rem;
        }
        .search-box input::placeholder { color: #6b7280; }
        .search-box::before {
            content: "🔍"; position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); font-size: 1rem;
        }
        select {
            padding: 12px 15px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05);
            color: #fff; font-size: 0.95rem; cursor: pointer;
        }
        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; }
        th {
            background: rgba(255,255,255,0.05); font-weight: 600;
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.5px; color: #9ca3af; cursor: pointer;
        }
        tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(255,255,255,0.03); }
        .stock-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
        .stock-ok { background: rgba(5, 150, 105, 0.2); color: #34d399; }
        .stock-low { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .stock-critical { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .stock-out { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
        .actions { display: flex; gap: 8px; }
        .btn-icon {
            width: 32px; height: 32px; border: none; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center;
        }
        .btn-edit { background: rgba(59,130,246,0.2); color:#60a5fa; }
        .btn-delete { background: rgba(239,68,68,0.2); color:#f87171; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); }
        .modal-overlay.active { display:flex; align-items:center; justify-content:center; }
        .modal { background:#1e293b; border-radius:16px; width:100%; max-width:500px; }
        .modal-header, .modal-body, .modal-footer { padding:20px; }
        .form-group { margin-bottom:20px; }
        .form-group input, .form-group textarea { width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        .empty-state { text-align:center; padding:60px 20px; color:#6b7280; }
        .toast-container { position:fixed; bottom:20px; right:20px; }
    </style>
</head>
<body>
<div class="container">
<header>
<h1>📦 Inventory Manager</h1>
<div class="header-actions">
<button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
</div>
</header>

<div class="stats-grid">
<div class="stat-card"><h3>Total Items</h3><div class="value" id="totalItems">0</div></div>
<div class="stat-card"><h3>Total Value</h3><div class="value" id="totalValue">£0</div></div>
</div>

<div class="table-container">
<table>
<thead><tr><th>SKU</th><th>Name</th><th>Qty</th><th>Price</th></tr></thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>
</div>

<script>
let inventory = [];

function renderTable() {
const tbody = document.getElementById('inventoryTable');
tbody.innerHTML = inventory.map(item => `
<tr>
<td>${item.sku}</td>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>£${item.price.toFixed(2)}</td>
</tr>
`).join('');
}

function updateStats() {
document.getElementById('totalItems').textContent = inventory.length;
const totalValue = inventory.reduce((sum, item) => sum + (item.price * item.quantity), 0);
document.getElementById('totalValue').textContent = new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(totalValue);
}
</script>
</body>
</html>
